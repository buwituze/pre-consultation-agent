services:
  - type: web
    name: pre-consultation-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    # RAM requirements:
    #   Both Whisper large-v3 models load in float32 and together need ~6 GB RAM.
    #   - Pro Plus (8 GB, $175/mo) — safest choice, comfortable headroom.
    #   - Pro       (4 GB,  $85/mo) — works only if model_a.py is changed to
    #                                  use float16 on CPU (DTYPE = torch.float16).
    plan: pro
    healthCheckPath: /health
    envVars:
      - key: DEVICE
        value: cpu
      - key: PYTHONUNBUFFERED
        value: "1"
      # HF_HOME points to the persistent disk so models survive redeploys.
      - key: HF_HOME
        value: /data/models

      # --- Set these in the Render dashboard (never commit real values) ---
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: USE_DB
        value: "true"
      # --- Gmail SMTP ---
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: SMTP_FROM_NAME
        value: "Eleza: Pre-Consultation System"
      # Your Gmail address — used as both the login username and the From address.
      # SMTP_USERNAME and SMTP_FROM_EMAIL must be set to the same Gmail address.
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USERNAME
        sync: false
      # Use a Gmail App Password here, NOT your regular login password.
      # Generate one at: Google Account → Security → 2-Step Verification → App passwords
      - key: SMTP_PASSWORD
        sync: false
      - key: APP_LOGIN_URL
        sync: false
      - key: MAX_TURNS
        value: "6"
      - key: MODEL_VERSION
        value: v1.0.0
      - key: AUDIO_STORAGE_DIR
        value: data/audio
      - key: LOG_LEVEL
        value: INFO

    # Persistent disk — Whisper models (~6 GB) are downloaded here on first
    # boot and reused on every subsequent deploy. 10 GB gives comfortable room.
    disk:
      name: whisper-model-cache
      mountPath: /data/models
      sizeGB: 10
